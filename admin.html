<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <script>document.documentElement.classList.add("js");</script>
  <title>Notice Admin | Lamahatta Higher Secondary School</title>
  <!-- Favicon using school crest (admin page) -->
  <link rel="icon" href="/assets/logo/school-crest-banner.jpg" type="image/jpeg" />
  <link rel="apple-touch-icon" href="/assets/logo/school-crest-banner.jpg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;700;800&family=Noto+Sans+Devanagari:wght@400;600;700&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="./css/base.css" />
  <link rel="stylesheet" href="./css/layout.css" />
  <link rel="stylesheet" href="./css/components.css" />
  <link rel="stylesheet" href="./css/hero.css" />
  <link rel="stylesheet" href="./css/pages.css" />
</head>
<body class="page-shell">
  <noscript><p style="margin:0;padding:0.5rem 1rem;background:#fffbeb;color:#854d0e;text-align:center;font-size:0.85rem;border-bottom:1px solid #fde68a;">This site works best with JavaScript for language switching, animations and the dynamic notices list.</p></noscript>
  <header class="site-header">
    <div class="container">
      <a href="./index.html" class="brand-lockup">
        <div class="logo-frame">
          <img src="/assets/logo/school-crest-banner.jpg" alt="Lamahatta Higher Secondary School crest" class="logo-image" width="72" height="72" />
        </div>
        <div class="brand-copy">
          <p class="school-name">Notice Board Admin</p>
          <p class="school-name-sub">Lamahatta Higher Secondary School</p>
        </div>
      </a>
      <a href="./index.html" class="btn btn-secondary">Back to site</a>
    </div>
  </header>

  <main class="section">
    <div class="container admin-wrap">
      <!-- Login -->
      <section id="loginView" class="admin-card glass-panel">
        <span class="eyebrow">Staff Only</span>
        <h1 class="card-title">Sign in to manage notices</h1>
        <p class="section-lead">Use the admin credentials to publish notices, upload PDFs and messages.</p>
        <form id="loginForm" class="stack-lg" autocomplete="off">
          <div class="field">
            <label for="adminUsername">Username / Email</label>
            <input id="adminUsername" type="email" value="admin@lamahattahighschool.in" required />
          </div>
          <div class="field">
            <label for="adminPassword">Password</label>
            <input id="adminPassword" type="password" autocomplete="current-password" required placeholder="Enter password" />
          </div>
          <p class="form-status" id="loginStatus" role="status" aria-live="polite"></p>
          <div><button class="btn btn-primary" type="submit">Sign in</button></div>
        </form>
      </section>

      <!-- Dashboard -->
      <section id="dashView" hidden>
        <div class="admin-head">
          <div>
            <span class="eyebrow">Notice Board Admin</span>
            <h1 class="display-title" style="font-size: clamp(2rem, 4vw, 3rem); max-width: none;">Manage notices</h1>
          </div>
          <button class="btn btn-secondary" id="logoutBtn" type="button">Sign out</button>
        </div>

        <div class="admin-grid">
          <form id="uploadForm" class="contact-form glass-panel" autocomplete="off">
            <h2 class="card-title">Publish a new notice</h2>
            <div class="field">
              <label for="noticeTitle">Title</label>
              <input id="noticeTitle" type="text" maxlength="200" required />
            </div>
            <div class="field">
              <label for="noticeDesc">Description</label>
              <textarea id="noticeDesc" maxlength="1000" placeholder="A short summary shown under the title."></textarea>
            </div>
            <div class="field">
              <label for="pdfFile">PDF document (max 10 MB)</label>
              <input id="pdfFile" type="file" accept="application/pdf" required />
            </div>
            <p class="form-status" id="uploadStatus" role="status" aria-live="polite"></p>
            <div><button class="btn btn-primary" id="publishBtn" type="submit">Publish notice</button></div>
          </form>

          <div class="stack-lg">
            <h2 class="card-title">Published notices</h2>
            <div id="adminNoticeList" class="stack-lg"></div>
          </div>
        </div>
      </section>
    </div>
  </main>

  <script type="module" src="./js/admin-page.js"></script>
</body>
</html>
